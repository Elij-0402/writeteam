name: Bug Report
description: 报告可复现的问题
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 清晰描述出现了什么问题
      placeholder: 例如：在编辑器点击保存后页面卡住
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 按顺序描述如何复现
      placeholder: |
        1. 打开...
        2. 点击...
        3. 观察...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
      placeholder: 应该发生什么
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      placeholder: 实际发生了什么
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: 环境信息
      description: 浏览器/系统/分支/提交号
      placeholder: Windows 11 + Chrome 134 + feature/xxx
  - type: textarea
    id: logs
    attributes:
      label: 日志与截图
      description: 请脱敏后粘贴日志或截图
